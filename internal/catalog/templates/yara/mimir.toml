[tool]
name = "yara"
description = "Pattern matching with YARA"
category = "forensics"
tags = ["malware", "signatures"]

[docker]
image = "dfir-yara:latest"
workdir = "/output"

[[docker.volumes]]
host = "evidence"
container = "/evidence"
mode = "ro"

[[docker.volumes]]
host = "output"
container = "/output"
mode = "rw"
