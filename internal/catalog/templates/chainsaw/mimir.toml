[tool]
name = "chainsaw"
description = "Windows event log analysis with Sigma rules"
category = "forensics"
tags = ["windows", "evtx", "log", "sigma", "detection"]

[docker]
image = "dfir-chainsaw:latest"
workdir = "/output"

[[docker.volumes]]
host = "evidence"
container = "/evidence"
mode = "ro"

[[docker.volumes]]
host = "output"
container = "/output"
mode = "rw"
