[tool]
name = "capa"
description = "MITRE ATT&CK capability mapper for binaries"
category = "malware"
tags = ["binary", "pe", "elf", "mitre", "att&ck", "analysis"]

[docker]
image = "dfir-capa:latest"
workdir = "/output"

[[docker.volumes]]
host = "evidence"
container = "/evidence"
mode = "ro"

[[docker.volumes]]
host = "output"
container = "/output"
mode = "rw"
