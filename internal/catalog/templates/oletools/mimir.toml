[tool]
name = "oletools"
description = "Office document macro and OLE analysis with oletools"
category = "malware"
tags = ["office", "ole", "macro", "vba", "doc", "xls", "rtf"]

[docker]
image = "dfir-oletools:latest"
workdir = "/output"

[[docker.volumes]]
host = "evidence"
container = "/evidence"
mode = "ro"

[[docker.volumes]]
host = "output"
container = "/output"
mode = "rw"
